<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApocWire - 海外プレスリリース配信</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#2563eb',
            'brand-dark': '#1d4ed8',
            ink: '#1a2f5e',
            sub: '#4a5568',
            mute: '#999',
            line: '#e0e0e0',
            bg: '#ffffff',
            surface: '#fff',
            highlight: '#facc15',
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans JP', system-ui, sans-serif; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    input:focus, select:focus, textarea:focus { outline: none; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #e0e0e0; border-top-color: #2563eb; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab-active { color: #1a2f5e; border-bottom: 2px solid #2563eb; }
    .tab-inactive { color: #999; border-bottom: 2px solid transparent; }
    .region-chip { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; padding: 2px 7px; border: 1px solid #e0e0e0; border-radius: 2px; color: #666; }
  </style>
</head>
<body class="bg-bg text-ink min-h-screen flex flex-col text-[14px]">

  <!-- Header public -->
  <header id="header-public" class="bg-white border-b border-line sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="#" onclick="navigate('home')" class="flex items-center gap-1.5">
        <span class="bg-brand text-white text-[11px] font-bold px-1.5 py-0.5 leading-none">AW</span>
        <span class="text-[15px] font-bold tracking-tight">ApocWire</span>
        <span class="text-[10px] text-mute ml-1 hidden sm:inline">Global Press Release</span>
      </a>
      <nav id="nav-public" class="hidden md:flex items-center gap-5 text-[13px]">
        <!-- populated by updatePublicNav() -->
      </nav>
      <button onclick="toggleMobileMenu()" class="md:hidden p-1 text-sub">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div id="mobile-menu" class="hidden md:hidden border-t border-line px-4 py-3 space-y-1 text-[13px] bg-white">
      <!-- populated by updatePublicNav() -->
    </div>
  </header>

  <!-- Header dash (hidden — replaced by sidebar layout) -->
  <div id="header-dash" class="hidden"></div>

  <!-- Header translator -->
  <header id="header-trans" class="bg-[#1a2f5e] sticky top-0 z-50 hidden">
    <div class="max-w-5xl mx-auto px-4 h-12 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="#" onclick="navigate('trans-dashboard')" class="flex items-center gap-1.5">
          <span class="bg-brand text-white text-[10px] font-bold px-1.5 py-0.5 leading-none">AW</span>
          <span class="text-[14px] font-bold text-white/90 tracking-tight">翻訳者パネル</span>
        </a>
        <nav class="hidden md:flex items-center gap-4 text-[12px]">
          <a href="#" onclick="navigate('trans-dashboard')" class="text-white/50 hover:text-white">案件一覧</a>
        </nav>
      </div>
      <div class="flex items-center gap-3">
        <span id="trans-user-name" class="text-[11px] text-white/40"></span>
        <button onclick="doLogout()" class="text-[12px] text-white/50 hover:text-white border border-white/20 px-2.5 py-1 rounded-sm">ログアウト</button>
      </div>
    </div>
  </header>

  <!-- Header admin (APOC) -->
  <header id="header-admin" class="bg-[#1a2f5e] sticky top-0 z-50 hidden">
    <div class="max-w-6xl mx-auto px-4 h-12 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="#" onclick="navigate('admin-dashboard')" class="flex items-center gap-1.5">
          <span class="bg-brand text-white text-[10px] font-bold px-1.5 py-0.5 leading-none">AW</span>
          <span class="text-[14px] font-bold text-white/90 tracking-tight">APOC管理</span>
        </a>
        <nav class="hidden md:flex items-center gap-4 text-[12px]">
          <a href="#" onclick="navigate('admin-dashboard')" class="text-white/50 hover:text-white">ダッシュボード</a>
          <a href="#" onclick="navigate('admin-orders')" class="text-white/50 hover:text-white">翻訳案件</a>
          <a href="#" onclick="navigate('admin-translators')" class="text-white/50 hover:text-white">翻訳者管理</a>
          <a href="#" onclick="navigate('admin-clients')" class="text-white/50 hover:text-white">事業者管理</a>
          <a href="#" onclick="navigate('admin-dist-orders')" class="text-white/50 hover:text-white">発注管理</a>
          <a href="#" onclick="navigate('admin-options')" class="text-white/50 hover:text-white">オプション管理</a>
        </nav>
      </div>
      <div class="flex items-center gap-3">
        <span id="admin-user-name" class="text-[11px] text-white/40"></span>
        <button onclick="doLogout()" class="text-[12px] text-white/50 hover:text-white border border-white/20 px-2.5 py-1 rounded-sm">ログアウト</button>
      </div>
    </div>
  </header>

  <main id="app" class="flex-1"></main>

  <footer id="footer" class="border-t border-line mt-auto bg-white">
    <div class="max-w-5xl mx-auto px-4 py-8">
      <div class="flex flex-col md:flex-row justify-between gap-6">
        <div>
          <div class="flex items-center gap-1.5 mb-2">
            <span class="bg-brand text-white text-[10px] font-bold px-1.5 py-0.5 leading-none">AW</span>
            <span class="text-[13px] font-bold">ApocWire</span>
          </div>
          <p class="text-[12px] text-mute">日本企業の海外プレスリリース配信プラットフォーム</p>
        </div>
        <div class="flex gap-10 text-[12px]">
          <div class="space-y-1.5">
            <a href="#" onclick="navigate('home')" class="block text-sub hover:text-ink">リリース一覧</a>
            <a href="#" onclick="navigate('categories')" class="block text-sub hover:text-ink">カテゴリ</a>
          </div>
          <div class="space-y-1.5">
            <a href="#" class="block text-sub hover:text-ink">利用規約</a>
            <a href="#" class="block text-sub hover:text-ink">プライバシーポリシー</a>
          </div>
        </div>
      </div>
      <p class="text-[11px] text-mute mt-6">&copy; 2026 ApocWire Inc.</p>
    </div>
  </footer>

  <script src="lib/mock-data.js"></script>
  <script>
    // ══════════════════════════════════════════════════
    //  USER ACCOUNTS & AUTH
    // ══════════════════════════════════════════════════
    const USERS = [
      { id: 'u1', email: 'toyota@example.com', password: 'toyota123', role: 'client', name: '鈴木 一郎', company: 'トヨタ自動車株式会社', translatorId: null },
      { id: 'u2', email: 'sony@example.com', password: 'sony123', role: 'client', name: '佐藤 花子', company: '株式会社ソニーグループ', translatorId: null },
      { id: 'u3', email: 'tanaka@example.com', password: 'tanaka123', role: 'translator', name: '田中 美咲', company: null, translatorId: 't1' },
      { id: 'u4', email: 'smith@example.com', password: 'smith123', role: 'translator', name: 'John Smith', company: null, translatorId: 't2' },
      { id: 'u5', email: 'li@example.com', password: 'li123', role: 'translator', name: '李 雪華', company: null, translatorId: 't3' },
      { id: 'u6', email: 'muller@example.com', password: 'muller123', role: 'translator', name: 'Anna Müller', company: null, translatorId: 't4' },
      { id: 'u7', email: 'kim@example.com', password: 'kim123', role: 'translator', name: '김 수진', company: null, translatorId: 't5' },
      { id: 'u8', email: 'admin@apoc.co.jp', password: 'apoc123', role: 'admin', name: '山田 太郎', company: '株式会社APOC', translatorId: null },
    ];

    let currentUser = JSON.parse(sessionStorage.getItem('aw_user') || 'null');
    let authToken = sessionStorage.getItem('aw_token') || '';
    let dbReleases = []; // DB press releases loaded from API
    let loginError = '';
    let loginStep = 'email'; // 'email' | 'code'
    let loginEmail = '';
    let otpHash = '';
    let otpExpiresAt = 0;
    let loginSending = false;

    function setSession(user, token) {
      currentUser = user;
      authToken = token || '';
      sessionStorage.setItem('aw_user', JSON.stringify(user));
      if (token) sessionStorage.setItem('aw_token', token);
    }

    async function loadMyReleases() {
      if (!authToken) return;
      try {
        const res = await fetch('/api/my-releases', {
          headers: { 'Authorization': 'Bearer ' + authToken },
        });
        if (!res.ok) return;
        const data = await res.json();
        dbReleases = data.releases || [];
        // For client: populate myReleases entirely from DB
        if (data.role !== 'admin') {
          myReleases = dbReleases.map(dbr => ({
            title: dbr.title || '（無題）',
            summary: dbr.company || '',
            status: 'published',
            date: dbr.published_at || '',
            slug: dbr.slug,
            ga_page_views: dbr.ga_page_views,
            ga_sessions: dbr.ga_sessions,
            source_url: dbr.source_url,
            thumbnailUrl: dbr.thumbnail_url,
            langs: ['日本語'],
            regions: [],
            body: dbr.body || '',
            videos: [],
          }));
        }
        render();
      } catch (e) {
        // DB fetch failed — myReleases stays empty
      }
    }

    function clearSession() {
      currentUser = null;
      authToken = '';
      sessionStorage.removeItem('aw_user');
      sessionStorage.removeItem('aw_token');
    }

    async function doLogin(email, password) {
      if (!email || !password) { loginError = 'メールアドレスとパスワードを入力してください'; render(); return; }
      loginSending = true;
      loginError = '';
      render();
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'ログインに失敗しました');
        setSession(data.user, data.token);
        loginError = '';
        if (data.user.role === 'translator') navigate('trans-dashboard');
        else if (data.user.role === 'admin') navigate('admin-dashboard');
        else { navigate('dashboard'); loadMyReleases(); }
        return;
      } catch (e) {
        loginError = e.message || 'ログインに失敗しました';
      }
      loginSending = false;
      render();
    }

    async function sendOtpCode() {
      const email = document.getElementById('login-email').value.trim();
      if (!email || !email.includes('@')) { loginError = 'メールアドレスを入力してください'; render(); return; }
      loginEmail = email;
      loginError = '';
      loginSending = true;
      render();
      try {
        const res = await fetch('/api/send-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '送信失敗');
        otpHash = data.hash;
        otpExpiresAt = data.expiresAt;
        loginStep = 'code';
        loginError = '';
      } catch (e) {
        loginError = e.message || '認証コードの送信に失敗しました';
      }
      loginSending = false;
      render();
    }

    async function verifyOtpCode() {
      const code = document.getElementById('login-code').value.trim();
      if (!code || code.length !== 6) { loginError = '6桁のコードを入力してください'; render(); return; }
      loginSending = true;
      loginError = '';
      render();
      try {
        const res = await fetch('/api/verify-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: loginEmail, code, hash: otpHash, expiresAt: otpExpiresAt }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '認証失敗');
        setSession(data.user, data.token);
        loginStep = 'email';
        loginError = '';
        if (data.user.role === 'translator') navigate('trans-dashboard');
        else if (data.user.role === 'admin') navigate('admin-dashboard');
        else navigate('dashboard');
        return;
      } catch (e) {
        loginError = e.message || '認証に失敗しました';
      }
      loginSending = false;
      render();
    }

    function resetOtpLogin() {
      loginStep = 'email';
      loginEmail = '';
      otpHash = '';
      otpExpiresAt = 0;
      loginError = '';
      render();
    }

    function doLogout() {
      // Delete session on server (fire-and-forget)
      if (authToken) {
        fetch('/api/logout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
        }).catch(() => {});
      }
      clearSession();
      navigate('home', {}, true);
    }

    function requireAuth(roles) {
      if (!currentUser) { navigate('login', {}, true); return false; }
      if (roles && !roles.includes(currentUser.role)) { navigate('login', {}, true); return false; }
      return true;
    }

    // ══════════════════════════════════════════════════
    //  URL ROUTING (History API)
    // ══════════════════════════════════════════════════
    const PAGE_TO_PATH = {
      home: '/', login: '/login', register: '/register',
      dashboard: '/dashboard', 'dash-new': '/dashboard/new', 'dash-analytics': '/dashboard/analytics', 'dash-detail': '/dashboard/detail', 'dash-order': '/dashboard/order',
      press: '/press', company: '/company', categories: '/categories',
      'trans-dashboard': '/translator', 'trans-work': '/translator/work',
      'admin-dashboard': '/admin', 'admin-orders': '/admin/orders', 'admin-translators': '/admin/translators', 'admin-clients': '/admin/clients', 'admin-order-detail': '/admin/order', 'admin-options': '/admin/options', 'admin-dist-orders': '/admin/dist-orders',
    };
    const PATH_TO_PAGE = Object.fromEntries(Object.entries(PAGE_TO_PATH).map(([k, v]) => [v, k]));

    function pathToPage(pathname) {
      return PATH_TO_PAGE[pathname] || PATH_TO_PAGE[pathname.replace(/\/$/, '')] || 'home';
    }

    function pageToUrl(page, params = {}) {
      let path = PAGE_TO_PATH[page] || '/';
      const qs = new URLSearchParams();
      if (params.id) qs.set('id', params.id);
      if (params.idx !== undefined) qs.set('idx', params.idx);
      if (params.orderId) qs.set('orderId', params.orderId);
      if (params.category) qs.set('category', params.category);
      const query = qs.toString();
      return query ? `${path}?${query}` : path;
    }

    function parseUrlParams() {
      const sp = new URLSearchParams(location.search);
      const params = {};
      if (sp.has('id')) params.id = sp.get('id');
      if (sp.has('idx')) params.idx = parseInt(sp.get('idx'), 10);
      if (sp.has('orderId')) params.orderId = sp.get('orderId');
      if (sp.has('category')) params.category = sp.get('category');
      return params;
    }

    // Determine initial page from URL
    let searchQuery = '';
    let selectedCategory = '';
    let currentPage = pathToPage(location.pathname);
    let currentParams = parseUrlParams();
    if (currentParams.category) selectedCategory = currentParams.category;
    let myReleases = [];

    const langCode = (c) => ({ ja: '日本語', en: 'English', zh: '中文', ko: '한국어', de: 'Deutsch', fr: 'Français', es: 'Español' }[c] || c);
    function getCategoryById(id) { return CATEGORIES.find(c => c.id === id); }
    function getCompanyById(id) { return COMPANIES.find(c => c.id === id); }
    function getLangById(id) { return LANGS.find(l => l.id === id); }
    function fmtDate(d) { const [y,m,day]=d.split('-'); return `${y}/${m}/${day}`; }

    function catLabel(categoryId, clickable = true) {
      const cat = getCategoryById(categoryId);
      if (!cat) return '';
      if (clickable) return `<span onclick="event.stopPropagation(); navigate('home',{category:'${cat.id}'});" class="text-brand text-[12px] font-medium cursor-pointer hover:underline">${cat.name}</span>`;
      return `<span class="text-brand text-[12px] font-medium">${cat.name}</span>`;
    }

    function regionChips(regionIds) {
      if (!regionIds || regionIds.length === 0) return '';
      return regionIds.map(id => {
        const r = REGIONS.find(x => x.id === id);
        return r ? `<span class="region-chip">${r.flag} ${r.name}</span>` : '';
      }).join(' ');
    }

    function coIcon(company, size = 'w-7 h-7 text-[10px]') {
      return `<div class="${size} bg-ink/8 text-ink/50 flex items-center justify-center font-bold flex-shrink-0 rounded-sm">${company.logo}</div>`;
    }

    function navigate(page, params = {}, replace = false) {
      currentPage = page;
      currentParams = params;
      if (page === 'home' && params.category) selectedCategory = params.category;
      else if (page === 'home') selectedCategory = '';
      const url = pageToUrl(page, params);
      if (replace) history.replaceState({ page, params }, '', url);
      else history.pushState({ page, params }, '', url);
      render();
      window.scrollTo({ top: 0 });
      document.getElementById('mobile-menu')?.classList.add('hidden');
    }

    window.addEventListener('popstate', (e) => {
      if (e.state) {
        currentPage = e.state.page || 'home';
        currentParams = e.state.params || {};
      } else {
        currentPage = pathToPage(location.pathname);
        currentParams = parseUrlParams();
      }
      if (currentParams.category) selectedCategory = currentParams.category;
      else selectedCategory = '';
      render();
    });

    function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }

    function showHeader(type) {
      document.getElementById('header-public').classList.toggle('hidden', type !== 'public');
      document.getElementById('header-dash').classList.toggle('hidden', type !== 'dash');
      document.getElementById('header-trans').classList.toggle('hidden', type !== 'trans');
      document.getElementById('header-admin').classList.toggle('hidden', type !== 'admin');
      document.getElementById('footer').classList.toggle('hidden', type !== 'public');
      updatePublicNav();
      // update user name displays
      if (currentUser) {
        const dn = document.getElementById('dash-user-name');
        const tn = document.getElementById('trans-user-name');
        const an = document.getElementById('admin-user-name');
        if (dn) dn.textContent = currentUser.company ? `${currentUser.name}（${currentUser.company}）` : currentUser.name;
        if (tn) {
          const tr = TRANSLATORS.find(t => t.id === currentUser.translatorId);
          tn.textContent = tr ? `${currentUser.name}（${tr.langs.map(langCode).join(' / ')}）` : currentUser.name;
        }
        if (an) an.textContent = `${currentUser.name}（${currentUser.company || 'APOC'}）`;
      }
    }

    function updatePublicNav() {
      const nav = document.getElementById('nav-public');
      const mobile = document.getElementById('mobile-menu');
      if (!nav) return;
      if (currentUser) {
        const dashLink = currentUser.role === 'translator' ? 'trans-dashboard' : currentUser.role === 'admin' ? 'admin-dashboard' : 'dashboard';
        const dashLabel = currentUser.role === 'translator' ? '翻訳パネル' : currentUser.role === 'admin' ? 'APOC管理' : '管理画面';
        nav.innerHTML = `
          <a href="#" onclick="navigate('home')" class="text-sub hover:text-ink">リリース一覧</a>
          <a href="#" onclick="navigate('categories')" class="text-sub hover:text-ink">カテゴリ</a>
          <span class="w-px h-4 bg-line"></span>
          <span class="text-[12px] text-sub">${currentUser.name}</span>
          <a href="#" onclick="navigate('${dashLink}')" class="bg-ink text-white px-3.5 py-1.5 rounded-sm text-[12px] font-medium hover:bg-ink/80">${dashLabel}</a>
          <button onclick="doLogout()" class="text-sub hover:text-ink text-[12px]">ログアウト</button>
        `;
        if (mobile) mobile.innerHTML = `
          <a href="#" onclick="navigate('home')" class="block py-1.5 text-sub">リリース一覧</a>
          <a href="#" onclick="navigate('categories')" class="block py-1.5 text-sub">カテゴリ</a>
          <a href="#" onclick="navigate('${dashLink}')" class="block py-1.5 text-sub">${dashLabel}</a>
          <div class="border-t border-line my-1"></div>
          <span class="block py-1.5 text-[12px] text-mute">${currentUser.name}（${currentUser.email}）</span>
          <button onclick="doLogout()" class="block py-1.5 text-brand font-medium">ログアウト</button>
        `;
      } else {
        nav.innerHTML = `
          <a href="#" onclick="navigate('home')" class="text-sub hover:text-ink">リリース一覧</a>
          <a href="#" onclick="navigate('categories')" class="text-sub hover:text-ink">カテゴリ</a>
          <span class="w-px h-4 bg-line"></span>
          <a href="#" onclick="navigate('login')" class="text-sub hover:text-ink">ログイン</a>
          <a href="#" onclick="navigate('register')" class="bg-ink text-white px-3.5 py-1.5 rounded-sm text-[12px] font-medium hover:bg-ink/80">無料会員登録</a>
        `;
        if (mobile) mobile.innerHTML = `
          <a href="#" onclick="navigate('home')" class="block py-1.5 text-sub">リリース一覧</a>
          <a href="#" onclick="navigate('categories')" class="block py-1.5 text-sub">カテゴリ</a>
          <a href="#" onclick="navigate('login')" class="block py-1.5 text-sub">ログイン</a>
          <a href="#" onclick="navigate('register')" class="block py-1.5 text-brand font-medium">無料会員登録</a>
        `;
      }
    }

    // ══════════════════════════════════════════════════
    //  SIDEBAR LAYOUT
    // ══════════════════════════════════════════════════
    function dashSidebar(activePage) {
      const menuItem = (page, label, icon) => {
        const active = currentPage === page;
        return `<a href="#" onclick="event.preventDefault(); navigate('${page}')" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-[13px] transition-colors ${active ? 'bg-brand text-white font-medium' : 'text-sub hover:bg-ink/5 hover:text-ink'}">
          ${icon}
          <span>${label}</span>
        </a>`;
      };
      const userName = currentUser ? (currentUser.company ? `${currentUser.name}` : currentUser.name) : '';
      const userSub = currentUser?.company || currentUser?.email || '';

      return `
        <aside class="w-[240px] flex-shrink-0 bg-white border-r border-line h-screen sticky top-0 flex flex-col">
          <div class="px-5 h-16 flex items-center border-b border-line">
            <a href="#" onclick="event.preventDefault(); navigate('dashboard')" class="flex items-center gap-2">

            ${menuItem('dash-order', 'サポート', '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"/></svg>')}
            ${menuItem('dash-analytics', '分析', '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>')}
          </nav>
          <div class="px-3 py-3 border-t border-line">
            <a href="#" onclick="event.preventDefault(); navigate('home')" class="flex items-center gap-2 px-3 py-2 text-[12px] text-mute hover:text-sub transition-colors rounded-md hover:bg-ink/5">

              公開サイトを見る
            </a>

            <div class="flex items-center gap-2.5 px-3 py-2.5">
              <div class="w-8 h-8 bg-ink/8 text-ink/50 flex items-center justify-center font-bold flex-shrink-0 rounded-full text-[11px]">${userName.charAt(0)}</div>

                <p class="text-[12px] font-medium truncate">${userName}</p>
                <p class="text-[10px] text-mute truncate">${userSub}</p>

              <button onclick="doLogout()" class="text-mute hover:text-ink transition-colors flex-shrink-0" title="ログアウト">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
              </button>

    function wrapDashLayout(content) {
      return `<div class="flex min-h-screen bg-bg">${dashSidebar()}<main class="flex-1 min-w-0">${content}</main></div>`;
    }

    function render() {
      const app = document.getElementById('app');
      const dashPages = ['dashboard', 'dash-new', 'dash-analytics', 'dash-detail', 'dash-order'];
      const transPages = ['trans-dashboard', 'trans-work'];
      const adminPages = ['admin-dashboard', 'admin-orders', 'admin-translators', 'admin-clients', 'admin-order-detail', 'admin-options', 'admin-dist-orders'];

      // Route guards — redirect to login if not authenticated or wrong role
      if (dashPages.includes(currentPage) && !requireAuth(['client'])) return;
      if (transPages.includes(currentPage) && !requireAuth(['translator'])) return;
      if (adminPages.includes(currentPage) && !requireAuth(['admin'])) return;

      let headerType = 'public';
      if (dashPages.includes(currentPage)) headerType = 'dash';
      else if (transPages.includes(currentPage)) headerType = 'trans';
      else if (adminPages.includes(currentPage)) headerType = 'admin';
      showHeader(headerType);

      let content;
      switch (currentPage) {
        case 'home': content = renderHome(); break;
        case 'press': content = renderPressDetail(); break;
        case 'company': content = renderCompany(); break;
        case 'categories': content = renderCategories(); break;
        case 'login': content = renderLogin(); break;
        case 'register': content = renderRegister(); break;
        case 'dashboard': content = renderDashboard(); break;
        case 'dash-new': content = renderDashNew(); break;
        case 'dash-analytics': content = renderDashAnalytics(); break;
        case 'dash-detail': content = renderDashDetail(); break;
        case 'dash-order': content = renderDashOrder(); break;
        case 'trans-dashboard': content = renderTransDashboard(); break;
        case 'trans-work': content = renderTransWork(); break;
        case 'admin-dashboard': content = renderAdminDashboard(); break;
        case 'admin-orders': content = renderAdminOrders(); break;
        case 'admin-translators': content = renderAdminTranslators(); break;
        case 'admin-clients': content = renderAdminClients(); break;
        case 'admin-order-detail': content = renderAdminOrderDetail(); break;
        case 'admin-options': content = renderAdminOptions(); break;
        case 'admin-dist-orders': content = renderAdminOrdersList(); break;
        default: content = renderHome();
      }

      // Wrap dashboard pages in sidebar layout
      if (dashPages.includes(currentPage)) {
        app.innerHTML = wrapDashLayout(content);
        if (currentPage === 'dash-analytics') initCharts();
        if (currentPage === 'dash-order' && orderStep === 1) loadStep1Options();
      } else {
        app.innerHTML = content;
      }
    }

    // ══════════════════════════════════════════════════
    //  HOME
    // ══════════════════════════════════════════════════
    function renderHome() {
      let filtered = [...PRESS_RELEASES];
      if (selectedCategory) filtered = filtered.filter(p => p.categoryId === selectedCategory);
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(p => p.title.toLowerCase().includes(q) || p.titleEn.toLowerCase().includes(q) || p.summary.toLowerCase().includes(q) || getCompanyById(p.companyId)?.name.toLowerCase().includes(q));
      }
      const showHero = !selectedCategory && !searchQuery;

      let featured = '';
      let rest = filtered;
      if (showHero && filtered.length >= 2) {
        const [a,b] = filtered; rest = filtered.slice(2);
        const coA = getCompanyById(a.companyId), coB = getCompanyById(b.companyId);
        featured = `
          <div class="max-w-5xl mx-auto px-4 pt-6 pb-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
              <div class="md:col-span-2 cursor-pointer group" onclick="navigate('press',{id:'${a.id}'})">
                <div class="bg-ink/5 h-48 md:h-56 rounded-sm mb-3 flex items-center justify-center overflow-hidden">
                  ${a.thumbnailUrl
                    ? `<img src="${a.thumbnailUrl}" alt="" class="w-full h-full object-cover">`
                    : `<span class="text-[11px] text-ink/15 tracking-widest uppercase">Press Release</span>`}
                </div>
                <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                  ${catLabel(a.categoryId)}
                  <span class="text-mute text-[12px]">${fmtDate(a.publishedAt)}</span>
                  <span class="text-[11px] text-ink/25">|</span>
                  ${regionChips(a.regions)}
                </div>
                <h2 class="font-bold text-[18px] leading-snug mb-1 group-hover:text-brand transition-colors">${a.title}</h2>
                <p class="text-[12px] text-mute mb-1.5 italic">${a.titleEn}</p>
                <p class="text-sub text-[13px] line-clamp-2 mb-2">${a.summary}</p>
                <span class="text-[12px] text-mute">${coA.name}</span>
              </div>
              <div class="cursor-pointer group" onclick="navigate('press',{id:'${b.id}'})">
                <div class="bg-ink/5 h-32 md:h-56 rounded-sm mb-3 flex items-center justify-center overflow-hidden">
                  ${b.thumbnailUrl
                    ? `<img src="${b.thumbnailUrl}" alt="" class="w-full h-full object-cover">`
                    : `<span class="text-[11px] text-ink/15 tracking-widest uppercase">Press Release</span>`}
                </div>
                <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                  ${catLabel(b.categoryId)}
                  <span class="text-mute text-[12px]">${fmtDate(b.publishedAt)}</span>
                </div>
                <h3 class="font-bold text-[15px] leading-snug mb-1 group-hover:text-brand transition-colors line-clamp-2">${b.title}</h3>
                <p class="text-[11px] text-mute italic line-clamp-2">${b.titleEn}</p>
                <span class="text-[12px] text-mute mt-1 inline-block">${coB.name}</span>
              </div>
            </div>
          </div>`;
      }

      const catName = selectedCategory ? getCategoryById(selectedCategory)?.name : '';
      let heading = '';
      if (selectedCategory) heading = `<a href="#" onclick="navigate('home')" class="text-[12px] text-mute hover:text-ink">&larr; すべて</a><h2 class="font-bold text-[17px] mt-1 mb-4">${catName}</h2>`;
      else if (searchQuery) heading = `<h2 class="font-bold text-[17px] mb-4">「${searchQuery}」の検索結果 <span class="text-mute font-normal text-[13px]">${filtered.length}件</span></h2>`;
      else heading = `<h2 class="font-bold text-[15px] mb-3">新着リリース</h2>`;

      const rows = rest.map(pr => {
        const co = getCompanyById(pr.companyId);
        return `
          <a href="#" onclick="event.preventDefault();navigate('press',{id:'${pr.id}'})" class="block group py-3.5 border-b border-line/60 last:border-0">
            <div class="flex items-start gap-4">
              <div class="w-20 h-14 rounded-sm bg-ink/5 flex-shrink-0 overflow-hidden flex items-center justify-center">
                ${pr.thumbnailUrl
                  ? `<img src="${pr.thumbnailUrl}" alt="" class="w-full h-full object-cover">`
                  : `<span class="text-[8px] text-ink/15 tracking-widest uppercase">PR</span>`}
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1 flex-wrap">
                  ${catLabel(pr.categoryId, false)}
                  <span class="text-[12px] text-mute">${fmtDate(pr.publishedAt)}</span>
                  <span class="text-ink/15 text-[11px]">|</span>
                  ${regionChips(pr.regions)}
                </div>
                <h3 class="font-medium text-[14px] leading-snug group-hover:text-brand transition-colors">${pr.title}</h3>
                <p class="text-[11px] text-mute italic mt-0.5">${pr.titleEn}</p>
                <span class="text-[11px] text-mute mt-1 inline-block">${co.name}</span>
              </div>
            </div>
          </a>`;
      }).join('');

      const noResults = filtered.length === 0 ? `<div class="text-center py-16"><p class="text-mute text-[13px]">該当するプレスリリースがありません</p><button onclick="searchQuery='';selectedCategory='';navigate('home');" class="text-brand text-[12px] mt-2 hover:underline">すべて表示</button></div>` : '';

      const searchSection = `
        <div class="flex flex-col md:flex-row gap-3 mb-6">
          <div class="relative flex-1">
            <svg class="w-4 h-4 text-mute absolute left-2.5 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" placeholder="キーワードで検索（日本語 / English）" value="${searchQuery}"
                   onkeydown="if(event.key==='Enter'){searchQuery=this.value;navigate('home');}"
                   class="w-full pl-8 pr-3 py-2 border border-line rounded-sm text-[13px] bg-white focus:border-ink/40 placeholder:text-ink/25">
          </div>
          <div class="flex gap-1.5 flex-wrap">
            <button onclick="selectedCategory='';searchQuery='';navigate('home');" class="px-2.5 py-1.5 text-[12px] rounded-sm border transition-colors ${!selectedCategory ? 'bg-ink text-white border-ink' : 'border-line text-sub hover:border-ink/30 bg-white'}">すべて</button>
            ${CATEGORIES.map(c => `<button onclick="selectedCategory='${c.id}';navigate('home',{category:'${c.id}'});" class="px-2.5 py-1.5 text-[12px] rounded-sm border transition-colors ${selectedCategory===c.id ? 'bg-ink text-white border-ink' : 'border-line text-sub hover:border-ink/30 bg-white'}">${c.name}</button>`).join('')}
          </div>
        </div>`;

      return `${featured}<section class="max-w-5xl mx-auto px-4 py-6">${searchSection}${heading}${rows}${noResults}</section>`;
    }

    // ══════════════════════════════════════════════════
    //  PRESS DETAIL (with JA/EN tabs)
    // ══════════════════════════════════════════════════
    function renderPressDetail() {
      const pr = PRESS_RELEASES.find(p => p.id === currentParams.id);
      if (!pr) return '<div class="max-w-3xl mx-auto px-4 py-20 text-center text-mute">記事が見つかりません</div>';
      const co = getCompanyById(pr.companyId);
      const related = PRESS_RELEASES.filter(p => p.id !== pr.id && (p.categoryId === pr.categoryId || p.companyId === pr.companyId)).slice(0, 4);

      function formatBody(text) {
        return text.split('\n').map(line => {
          if (line.startsWith('■')) return `<h3 class="font-bold text-[14px] text-ink mt-6 mb-1.5">${line}</h3>`;
          if (line.startsWith('・')) return `<p class="text-sub pl-3 text-[13px] leading-relaxed">${line}</p>`;
          if (line.match(/^\d+\./)) return `<p class="text-sub pl-3 text-[13px] leading-relaxed">${line}</p>`;
          if (line.trim() === '') return '<div class="h-2"></div>';
          return `<p class="text-sub text-[13px] leading-[1.85]">${line}</p>`;
        }).join('');
      }

      return `
        <div class="max-w-3xl mx-auto px-4 py-6">
          <a href="#" onclick="event.preventDefault();navigate('home')" class="text-[12px] text-mute hover:text-ink inline-block mb-5">&larr; 一覧に戻る</a>
          <article class="bg-white border border-line rounded-sm overflow-hidden">
            <div class="p-5 md:p-8">
              <div class="flex items-center gap-2 mb-3 flex-wrap">
                ${catLabel(pr.categoryId)}
                <span class="text-[12px] text-mute">${fmtDate(pr.publishedAt)}</span>
                <span class="text-ink/15 text-[11px]">|</span>
                ${regionChips(pr.regions)}
              </div>

              <!-- Language tabs -->
              <div class="flex gap-4 border-b border-line mb-5" id="detail-tabs">
                <button onclick="switchDetailLang('ja')" class="pb-2 text-[13px] font-medium tab-active" data-lang="ja">日本語</button>
                <button onclick="switchDetailLang('en')" class="pb-2 text-[13px] font-medium tab-inactive" data-lang="en">English</button>
              </div>

              <div id="detail-ja">
                <h1 class="font-bold text-[20px] md:text-[22px] leading-snug mb-3">${pr.title}</h1>
                <p class="text-sub text-[14px] leading-relaxed mb-6 pb-5 border-b border-line">${pr.summary}</p>
                <div>${formatBody(pr.body)}</div>
              </div>
              <div id="detail-en" class="hidden">
                <h1 class="font-bold text-[20px] md:text-[22px] leading-snug mb-3">${pr.titleEn}</h1>
                <p class="text-sub text-[14px] leading-relaxed mb-6 pb-5 border-b border-line">${pr.summaryEn}</p>
                <div>${formatBody(pr.bodyEn)}</div>
              </div>

              <div class="flex items-center gap-2 mt-8 pt-5 border-t border-line">
                <span class="text-[11px] text-mute mr-1">シェア</span>
                <button class="w-7 h-7 border border-line rounded-sm flex items-center justify-center hover:border-ink/30"><svg class="w-3 h-3 text-sub" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></button>
                <button class="w-7 h-7 border border-line rounded-sm flex items-center justify-center hover:border-ink/30"><svg class="w-3 h-3 text-sub" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></button>
                <button onclick="navigator.clipboard?.writeText(location.href)" class="w-7 h-7 border border-line rounded-sm flex items-center justify-center hover:border-ink/30"><svg class="w-3 h-3 text-sub" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m9.86-2.54a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/></svg></button>
              </div>
            </div>
            <div class="border-t border-line p-5 md:px-8 bg-bg/50 cursor-pointer group" onclick="navigate('company',{id:'${co.id}'})">
              <div class="flex items-start gap-3">
                ${coIcon(co, 'w-10 h-10 text-[12px]')}
                <div>
                  <p class="text-[11px] text-mute mb-0.5">配信企業</p>
                  <p class="font-medium text-[14px] group-hover:text-brand transition-colors">${co.name} <span class="text-mute font-normal text-[12px]">${co.nameEn}</span></p>
                  <p class="text-[12px] text-mute mt-0.5">${co.industry} / ${co.founded}創業</p>
                </div>
              </div>
            </div>
          </article>
          ${related.length > 0 ? `<div class="mt-8"><h2 class="font-bold text-[14px] mb-3">関連リリース</h2>${related.map(r => `<a href="#" onclick="event.preventDefault();navigate('press',{id:'${r.id}'})" class="block group py-3 border-b border-line/60 last:border-0"><div class="flex items-center gap-2 mb-0.5">${catLabel(r.categoryId, false)}<span class="text-[11px] text-mute">${fmtDate(r.publishedAt)}</span></div><p class="text-[13px] font-medium group-hover:text-brand transition-colors">${r.title}</p></a>`).join('')}</div>` : ''}
        </div>`;
    }

    function switchDetailLang(lang) {
      document.getElementById('detail-ja').classList.toggle('hidden', lang !== 'ja');
      document.getElementById('detail-en').classList.toggle('hidden', lang !== 'en');
      document.querySelectorAll('#detail-tabs button').forEach(btn => {
        btn.className = `pb-2 text-[13px] font-medium ${btn.dataset.lang === lang ? 'tab-active' : 'tab-inactive'}`;
      });
    }

    // ══════════════════════════════════════════════════
    //  COMPANY
    // ══════════════════════════════════════════════════
    function renderCompany() {
      const co = getCompanyById(currentParams.id);
      if (!co) return '<div class="max-w-3xl mx-auto px-4 py-20 text-center text-mute">企業が見つかりません</div>';
      const releases = PRESS_RELEASES.filter(p => p.companyId === co.id);
      return `
        <div class="max-w-3xl mx-auto px-4 py-6">
          <a href="#" onclick="event.preventDefault();navigate('home')" class="text-[12px] text-mute hover:text-ink inline-block mb-5">&larr; 一覧</a>
          <div class="bg-white border border-line rounded-sm p-5 md:p-8 mb-6">
            <div class="flex items-start gap-4 mb-5">
              ${coIcon(co, 'w-14 h-14 text-[16px]')}
              <div>
                <h1 class="font-bold text-[18px]">${co.name}</h1>
                <p class="text-[12px] text-mute">${co.nameEn}</p>
                <p class="text-[12px] text-mute mt-0.5">${co.industry} / ${co.founded}創業 / ${co.employees}</p>
              </div>
            </div>
            <p class="text-[13px] text-sub leading-relaxed mb-5">${co.description}</p>
            <div class="flex gap-6">
              <div><p class="text-[11px] text-mute">リリース数</p><p class="font-bold text-[18px]">${releases.length}</p></div>
              <div><p class="text-[11px] text-mute">最終更新</p><p class="font-bold text-[18px]">${releases.length>0?fmtDate(releases[0].publishedAt):'-'}</p></div>
            </div>
          </div>
          <h2 class="font-bold text-[14px] mb-3">プレスリリース</h2>
          ${releases.map(pr => `<a href="#" onclick="event.preventDefault();navigate('press',{id:'${pr.id}'})" class="block group py-3.5 border-b border-line/60 last:border-0"><div class="flex items-center gap-2 mb-1">${catLabel(pr.categoryId,false)}<span class="text-[12px] text-mute">${fmtDate(pr.publishedAt)}</span><span class="text-ink/15 text-[11px]">|</span>${regionChips(pr.regions)}</div><h3 class="font-medium text-[14px] leading-snug group-hover:text-brand transition-colors">${pr.title}</h3><p class="text-[11px] text-mute italic mt-0.5">${pr.titleEn}</p></a>`).join('')}
        </div>`;
    }

    // ══════════════════════════════════════════════════
    //  CATEGORIES
    // ══════════════════════════════════════════════════
    function renderCategories() {
      return `
        <div class="max-w-3xl mx-auto px-4 py-6">
          <h1 class="font-bold text-[17px] mb-5">カテゴリ</h1>
          <div class="bg-white border border-line rounded-sm divide-y divide-line">
            ${CATEGORIES.map(cat => {
              const count = PRESS_RELEASES.filter(p => p.categoryId === cat.id).length;
              return `<a href="#" onclick="event.preventDefault();navigate('home',{category:'${cat.id}'})" class="block group px-5 py-4 hover:bg-bg/50 transition-colors"><div class="flex items-center justify-between"><p class="font-medium text-[14px] group-hover:text-brand transition-colors">${cat.name}</p><span class="text-[18px] font-bold text-ink/20">${count}</span></div></a>`;
            }).join('')}
          </div>

    async function doRegister() {
      const last = document.getElementById('reg-last').value.trim();
      const first = document.getElementById('reg-first').value.trim();
      const company = document.getElementById('reg-company').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pw = document.getElementById('reg-password').value;
      const pw2 = document.getElementById('reg-password2').value;
      const agree = document.getElementById('reg-agree').checked;

      if (!last || !first) { registerError = '姓名を入力してください'; render(); return; }
      if (!email || !email.includes('@')) { registerError = '有効なメールアドレスを入力してください'; render(); return; }
      if (pw.length < 8) { registerError = 'パスワードは8文字以上で入力してください'; render(); return; }
      if (pw !== pw2) { registerError = 'パスワードが一致しません'; render(); return; }
      if (!agree) { registerError = '利用規約に同意してください'; render(); return; }

      registerError = '';
      registerSending = true;
      render();

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pw, name: last + ' ' + first, company: company || undefined }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '登録に失敗しました');

        registeredEmail = email;
        registerStep = 'sent';
      } catch (e) {
        registerError = e.message || '登録に失敗しました';
      }
      registerSending = false;
      render();
    }

    async function syncGAData() {
      const btn = document.getElementById('btn-ga-sync');
      if (btn) { btn.disabled = true; btn.textContent = '同期中...'; }
      try {
        const res = await fetch('/api/ga-sync', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
        });
        const data = await res.json();
        if (res.ok) {
          alert(`GA同期完了: ${data.updated}件更新`);
          await loadMyReleases();
        } else {
          alert(`エラー: ${data.error}`);
        }
      } catch (e) {
        alert('GA同期に失敗しました');
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'データを更新'; }
      }
    }

    function deleteRelease(idx) { myReleases.splice(idx, 1); render(); }

      };
      return icons[p] || '';
    }
    function platformColor(p) {
      return { youtube: 'text-red-600', tiktok: 'text-ink', instagram: 'text-pink-600', twitter: 'text-ink' }[p] || 'text-sub';
    }
    function platformName(p) {
      return { youtube: 'YouTube', tiktok: 'TikTok', instagram: 'Instagram', twitter: 'X (Twitter)' }[p] || p;
    }
    function fmtViews(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'K';
      return n.toString();

      if (!myReleases[idx].videos) myReleases[idx].videos = [];

    function doTranslate() {
      const title = document.getElementById('form-title')?.value || '';
      const summary = document.getElementById('form-summary')?.value || '';
      const body = document.getElementById('form-body')?.value || '';

      if (!title && !summary && !body) { alert('翻訳する日本語テキストを入力してください'); return; }

      const resultsEl = document.getElementById('translation-results');
      resultsEl.classList.remove('hidden');
      resultsEl.innerHTML = selectedLangs.map(langId => {
        const lang = getLangById(langId);
        return `<div class="border border-line rounded-sm p-4" id="trans-${langId}">
          <div class="flex items-center justify-between mb-2">
            <p class="text-[12px] font-medium">${lang.label} (${lang.name})</p>
            <span class="spinner" id="spinner-${langId}"></span>
          </div>
          <p class="text-[11px] text-mute">翻訳中...</p>
        </div>`;
      }).join('');

      // Simulate translation with staggered delays
      selectedLangs.forEach((langId, i) => {
        const delay = 800 + i * 600 + Math.random() * 400;
        setTimeout(() => {
          const lang = getLangById(langId);
          const el = document.getElementById(`trans-${langId}`);
          if (!el) return;

          // Mock translations (only English has real mock, others get placeholder)
          let tTitle, tSummary;
          if (langId === 'en') {
            tTitle = mockTranslateEn(title);
            tSummary = mockTranslateEn(summary);
          } else if (langId === 'zh') {
            tTitle = `[中文] ${title}`;
            tSummary = `[中文] ${summary}`;
          } else if (langId === 'ko') {
            tTitle = `[한국어] ${title}`;
            tSummary = `[한국어] ${summary}`;
          } else if (langId === 'es') {
            tTitle = `[Español] ${title}`;
            tSummary = `[Español] ${summary}`;
          } else if (langId === 'fr') {
            tTitle = `[Français] ${title}`;
            tSummary = `[Français] ${summary}`;
          } else {
            tTitle = `[${lang.name}] ${title}`;
            tSummary = `[${lang.name}] ${summary}`;
          }

          translatedTexts[langId] = { title: tTitle, summary: tSummary };

          el.innerHTML = `
            <div class="flex items-center justify-between mb-2">
              <p class="text-[12px] font-medium flex items-center gap-1.5">
                <span class="w-4 h-4 bg-green-600 text-white rounded-full flex items-center justify-center text-[9px]">&#10003;</span>
                ${lang.label} (${lang.name})
              </p>
              <button onclick="editTranslation('${langId}')" class="text-[11px] text-brand hover:underline">編集</button>
            </div>
            <div class="space-y-1.5">
              <div><p class="text-[10px] text-mute">タイトル</p><p class="text-[13px]" id="trans-title-${langId}">${tTitle}</p></div>
              <div><p class="text-[10px] text-mute">サマリー</p><p class="text-[13px]" id="trans-summary-${langId}">${tSummary}</p></div>
            </div>
          `;

          // Update preview tabs
          updatePreviewTabs();
        }, delay);
      });
    }

      // Simple mock: return a plausible English version
      const map = {

      const jaTitle = document.getElementById('form-title')?.value || '';

      let title, summary, body;
      if (previewLang === 'ja') {
        title = jaTitle; summary = jaSummary; body = jaBody;
      } else if (translatedTexts[previewLang]) {
        title = translatedTexts[previewLang].title || '';

      const t = document.getElementById('pv-title');
      const s = document.getElementById('pv-summary');

      const c = document.getElementById('pv-cat');

      if (t) { t.textContent = title || 'タイトル'; t.className = `font-bold text-[14px] leading-snug mb-1.5 ${title ? 'text-ink' : 'text-ink/25'}`; }

      if (c) { c.textContent = cat ? cat.name : 'カテゴリ'; c.className = `text-[11px] ${cat ? 'text-brand font-medium' : 'text-mute'}`; }
      if (b) {
        if (body && body !== '(翻訳本文はプレビューでは省略)') {
          b.innerHTML = body.split('\n').map(l => {
            if (l.startsWith('■')) return `<p class="font-bold text-ink text-[12px] mt-2 mb-0.5">${l}</p>`;
            if (l.startsWith('・')) return `<p class="text-sub pl-2 text-[11px]">${l}</p>`;
            if (l.trim() === '') return '<div class="h-1.5"></div>';
            return `<p class="text-sub text-[11px]">${l}</p>`;
          }).join('');
        } else if (body === '(翻訳本文はプレビューでは省略)') {
          b.innerHTML = `<span class="text-mute text-[11px] italic">${body}</span>`;
        } else {

      const langLabel = { en: 'EN', zh: '中文', ko: '한국어', de: 'DE', fr: 'FR', es: 'ES', ja: 'JA' };
      const body = document.getElementById('media-table-body');
      if (!body) return;
      body.innerHTML = items.map(m => {
        const reg = REGIONS.find(r => r.id === m.region);
        return `
          <tr class="border-b border-line/60 last:border-0">
            <td class="py-2.5 pr-2 text-[12px] text-mute whitespace-nowrap">${fmtDate(m.date)}</td>

          </tr>`;
      }).join('');
      if (items.length === 0) {
        body.innerHTML = '<tr><td colspan="7" class="py-8 text-center text-mute text-[12px]">該当する掲載がありません</td></tr>';
      }
    }

    function getFilteredMedia() {
      if (!analyticsData) return [];
      const slugFilter = document.getElementById('media-filter-slug')?.value || '';
      const regionFilter = document.getElementById('media-filter-region')?.value || '';
      let items = analyticsData.mediaCoverage;
      if (slugFilter) items = items.filter(m => m.slug === slugFilter);
      if (regionFilter) items = items.filter(m => m.region === regionFilter);
      return items;
    }

    function downloadMediaCSV() {
      const items = getFilteredMedia();
      if (items.length === 0) { alert('ダウンロードするデータがありません'); return; }

      const BOM = '\uFEFF';
      const header = ['掲載日', 'メディア名', '対象リリース', 'スラッグ', '地域', '言語', 'カテゴリ', 'URL'];
      const rows = items.map(m => {
        const reg = REGIONS.find(r => r.id === m.region);
        return [
          m.date,
          m.media,
          m.release,
          m.slug,
          reg ? reg.name : m.region,
          m.lang,
          m.type,
          m.url,
        ].map(v => '"' + String(v).replace(/"/g, '""') + '"');
      });

      const csv = BOM + [header.join(','), ...rows.map(r => r.join(','))].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `apocwire_media_coverage_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // slug inline edit (admin only)
    function startSlugEdit(el, prId, currentSlug, prTitle) {
      if (el.querySelector('input')) return; // already editing
      const input = document.createElement('input');
      input.type = 'text';
      input.value = currentSlug;
      input.placeholder = 'cyberagent_us20260316';
      input.className = 'px-2 py-1 border border-brand rounded text-[11px] font-mono w-full focus:outline-none';
      el.innerHTML = '';
      el.appendChild(input);
      input.focus();
      let saved = false;
      const save = () => {
        if (saved) return;
        saved = true;
        saveSlug(el, prId, input.value.trim(), prTitle);
      };
      input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); save(); } });
      input.addEventListener('blur', save);
    }

    async function saveSlug(el, prId, slug, prTitle) {
      const renderSlug = (s) => s
        ? `<span class="text-[11px] font-mono text-brand">${s}</span>`
        : '<span class="text-[11px] text-mute">未設定</span>';
      try {
        const res = await fetch('/api/update-slug', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: prId, title: prTitle, slug }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        // Update local data
        const pr = PRESS_RELEASES.find(p => p.id === prId);

    let orderSelectedOptions = [];

    let orderComplete = false;
